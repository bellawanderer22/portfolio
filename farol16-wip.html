<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farol 16 — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --naval: #2a385d;
      --mango: #c98922;
      --vainilla: #dfddd8;
      --pimienta: #5f6260;
      --ink: #1a1a1a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--naval);
      font-family: 'Inter', sans-serif;
      color: var(--vainilla);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(201,137,34,0.15), transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(223,221,216,0.08), transparent 55%);
      pointer-events: none;
    }

    .wrap {
      position: relative;
      text-align: center;
      max-width: 560px;
      padding: 3rem 2rem;
      z-index: 2;
    }

    .mark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--mango);
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 60px; height: 1px;
      background: var(--mango);
      margin: 0 auto 2.5rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3rem, 8vw, 5.5rem);
      line-height: 1;
      letter-spacing: 0.04em;
      margin-bottom: 1.5rem;
      color: var(--vainilla);
    }

    h1 em {
      font-style: italic;
      color: var(--mango);
      font-weight: 400;
    }

    .tag {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.05rem, 2vw, 1.3rem);
      color: rgba(223,221,216,0.85);
      margin-bottom: 3rem;
    }

    .status {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: rgba(223,221,216,0.7);
      padding: 0.9rem 2rem;
      border: 1px solid rgba(223,221,216,0.25);
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
    }

    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--mango);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    .back {
      display: inline-block;
      margin-top: 2.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(223,221,216,0.5);
      text-decoration: none;
      transition: color 0.3s;
    }
    .back:hover { color: var(--mango); }

    footer {
      position: absolute;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(223,221,216,0.35);
      text-align: center;
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      .wrap { padding: 2rem 1.5rem; }
      .status { padding: 0.75rem 1.25rem; font-size: 0.65rem; letter-spacing: 0.2em; }
      footer { font-size: 0.55rem; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="mark">Farol 16</div>
  <div class="divider"></div>
  <h1>Something <em>crafted</em><br/>is on the way.</h1>
  <p class="tag">A cinematic new home for Farol 16, coming soon to Pedregal.</p>

  <div class="status">
    <span class="dot"></span>
    <span>In Development</span>
  </div>

  <div>
    <a class="back" href="index.html">&larr; Return to Portfolio</a>
  </div>
</div>

<footer>Bella Wanderer &middot; Portfolio Preview</footer>

</body>
</html>
